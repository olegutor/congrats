<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Congrads Steg — открытки со стеганографией</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <main class="app">
    <header class="app__header">
      <h1 class="app__title">Congrads Steg</h1>
      <p class="app__subtitle">Открытка + скрытое сообщение. Всё в браузере, без сервера.</p>
    </header>

    <nav class="tabs" role="tablist">
      <button type="button" class="tabs__btn tabs__btn--active" data-tab="encode" role="tab" aria-selected="true">Спрятать</button>
      <button type="button" class="tabs__btn" data-tab="decode" role="tab" aria-selected="false">Извлечь</button>
    </nav>

    <section id="panel-encode" class="panel" data-panel="encode">
      <section class="app__editor" aria-label="Открытка">
        <label class="field" for="renderer-version">
          <span class="field__label">Версия оформления</span>
          <select id="renderer-version" class="field__select">
            <option value="v1">v1 — классика</option>
            <option value="v2" selected>v2 — градиенты</option>
          </select>
        </label>
        <label class="field" for="wish-text">
          <span class="field__label">Текст на открытке</span>
          <textarea id="wish-text" class="field__textarea" rows="4" spellcheck="true"></textarea>
        </label>
        <label class="field" for="signature-text">
          <span class="field__label">Подпись</span>
          <input id="signature-text" class="field__input" type="text" spellcheck="true">
        </label>
      </section>

      <section class="app__preview" aria-label="Превью">
        <p id="loading-label" class="loading-label">Загрузка шрифтов…</p>
        <canvas id="preview-canvas" class="preview-canvas" hidden></canvas>
      </section>

      <div class="app__actions">
        <button id="generate-button" type="button" class="btn btn--primary">Другая открытка</button>
        <button id="apply-button" type="button" class="btn btn--secondary">Обновить текст</button>
      </div>

      <section class="payload-box" aria-label="Секрет">
        <label class="field" for="secret-text">
          <span class="field__label">Секретное сообщение</span>
          <textarea id="secret-text" class="field__textarea" rows="3" placeholder="Текст, который спрячется в PNG"></textarea>
        </label>
        <label class="field" for="secret-file">
          <span class="field__label">Или файл</span>
          <input id="secret-file" class="field__input" type="file">
        </label>
        <fieldset class="crypto-fieldset">
          <legend>Шифрование</legend>
          <label class="radio">
            <input type="radio" name="crypto-mode" value="none" checked>
            Без шифрования
          </label>
          <label class="radio">
            <input type="radio" name="crypto-mode" value="password">
            Пароль (gcmwrap)
          </label>
          <label class="radio">
            <input type="radio" name="crypto-mode" value="pubkey">
            Публичный ключ GPG
          </label>
          <label class="field field--nested" for="encode-password">
            <span class="field__label">Пароль</span>
            <input id="encode-password" class="field__input" type="password" autocomplete="new-password" disabled>
          </label>
          <label class="field field--nested" for="encode-pubkey">
            <span class="field__label">Публичный ключ (ASCII armor)</span>
            <textarea id="encode-pubkey" class="field__textarea" rows="4" disabled></textarea>
          </label>
        </fieldset>
        <p id="capacity-label" class="hint"></p>
        <button id="encode-download-button" type="button" class="btn btn--primary" disabled>
          Спрятать и скачать PNG
        </button>
        <p id="encode-status" class="status" role="status"></p>
      </section>
    </section>

    <section id="panel-decode" class="panel panel--hidden" data-panel="decode" hidden>
      <label class="field" for="stego-file">
        <span class="field__label">PNG со скрытыми данными</span>
        <input id="stego-file" class="field__input" type="file" accept="image/png">
      </label>
      <fieldset class="crypto-fieldset">
        <legend>Расшифровка</legend>
        <label class="radio">
          <input type="radio" name="decode-mode" value="raw" checked>
          Как есть (без пароля)
        </label>
        <label class="radio">
          <input type="radio" name="decode-mode" value="password">
          Пароль
        </label>
        <label class="radio">
          <input type="radio" name="decode-mode" value="pgp">
          Экспорт как PGP MESSAGE
        </label>
        <label class="field field--nested" for="decode-password">
          <span class="field__label">Пароль</span>
          <input id="decode-password" class="field__input" type="password" autocomplete="current-password" disabled>
        </label>
      </fieldset>
      <button id="decode-button" type="button" class="btn btn--primary">Извлечь</button>
      <p id="decode-status" class="status" role="status"></p>
      <label class="field" for="decode-output">
        <span class="field__label">Результат</span>
        <textarea id="decode-output" class="field__textarea" rows="8" readonly></textarea>
      </label>
      <button id="download-payload-button" type="button" class="btn btn--secondary" disabled>
        Скачать байты
      </button>
    </section>

    <footer class="app__footer">
      <p>HILL + STC в PNG · crypto из sentence_steg (gcmwrap / GPG + Feistel)</p>
    </footer>
  </main>
  <script type="module" src="/src/app.js"></script>
</body>
</html>
